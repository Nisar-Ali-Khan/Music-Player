<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player | Nisar Ali</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="music-container">
        <!-- Sidebar - Playlist -->
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-music"></i>
                <h2>Music Player</h2>
            </div>
            
            <!-- Search -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search songs...">
            </div>
            
            <!-- Categories -->
            <div class="categories">
                <h3>Categories</h3>
                <div class="category-list">
                    <button class="category-btn active" data-category="all">
                        <i class="fas fa-list"></i> All Songs
                    </button>
                    <button class="category-btn" data-category="pop">
                        <i class="fas fa-music"></i> Pop
                    </button>
                    <button class="category-btn" data-category="rock">
                        <i class="fas fa-guitar"></i> Rock
                    </button>
                    <button class="category-btn" data-category="jazz">
                        <i class="fas fa-saxophone"></i> Jazz
                    </button>
                    <button class="category-btn" data-category="electronic">
                        <i class="fas fa-headphones"></i> Electronic
                    </button>
                    <button class="category-btn" data-category="classical">
                        <i class="fas fa-violin"></i> Classical
                    </button>
                </div>
            </div>
            
            <!-- Playlist -->
            <div class="playlist">
                <h3>Playlist</h3>
                <ul id="playlist" class="playlist-list"></ul>
            </div>
        </div>
        
        <!-- Main Player Area -->
        <div class="main-player">
            <!-- Now Playing -->
            <div class="now-playing">
                <div class="album-art">
                    <img id="albumArt" src="https://via.placeholder.com/300/667eea/ffffff?text=Music" alt="Album Art">
                </div>
                <div class="song-info">
                    <h2 id="songTitle">Select a song</h2>
                    <p id="artistName">Artist</p>
                </div>
            </div>
            
            <!-- Player Controls -->
            <div class="player-controls">
                <!-- Progress Bar -->
                <div class="progress-container">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
                
                <!-- Control Buttons -->
                <div class="controls">
                    <button id="shuffleBtn" class="control-btn" title="Shuffle">
                        <i class="fas fa-random"></i>
                    </button>
                    <button id="prevBtn" class="control-btn" title="Previous">
                        <i class="fas fa-backward"></i>
                    </button>
                    <button id="playBtn" class="control-btn play-btn" title="Play">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="nextBtn" class="control-btn" title="Next">
                        <i class="fas fa-forward"></i>
                    </button>
                    <button id="repeatBtn" class="control-btn" title="Repeat">
                        <i class="fas fa-redo-alt"></i>
                    </button>
                </div>
                
                <!-- Volume Control -->
                <div class="volume-control">
                    <i class="fas fa-volume-down" id="volumeIcon"></i>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                    <i class="fas fa-volume-up"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="audio" src=""></audio>

    <script src="js/app.js"></script>
</body>
</html>
